[tools]
node = "lts"

terraform = "1.9.0"

# Google Cloud SDK (プレースホルダ) 後で調整
gcloud = "469.0.0"

# ShellCheck (プレースホルダ) 後で調整
shellcheck = "0.10.0"

# sver を aqua 経由で取得 (指定版は元 Dockerfile ARG に合わせ v0.1.20)
"aqua:sver" = "0.1.20"

# 追加・運用メモ:
# - ここを編集すると `docker build` で mise 層のみ再ビルド。
# - バージョン調整後は CI/ローカルで `mise install` 実行を推奨。